name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: Expo prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Ensure debug keystore exists
        run: |
          # Expo prebuild copia o debug.keystore pra android/app/. Se por alguma
          # razao nao existir (versao mais nova do Expo), gera um novo ai.
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK (JS bundle embedded, signed with debug key)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon --parallel -x lint -x test

      - name: Rename APK with version
        id: rename
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="fyneex-operador-${VERSION}-${SHORT_SHA}.apk"
          # O APK sai em app-release.apk OU app-release-unsigned.apk dependendo
          # da versao do AGP; aceita os dois.
          SRC=$(ls android/app/build/outputs/apk/release/app-release*.apk | head -1)
          mv "$SRC" "android/app/build/outputs/apk/release/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: android/app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rename.outputs.version }}-build${{ github.run_number }}
          name: APK v${{ steps.rename.outputs.version }} build ${{ github.run_number }}
          body: |
            APK assinado (debug keystore, suficiente pra sideload).
            Commit `${{ github.sha }}`.

            **Baixe o .apk abaixo**, abra no Chrome do celular, permita instalar de fonte desconhecida, instale por cima do anterior.
          files: android/app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
