name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: Expo prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --parallel -x lint -x test

      - name: Rename APK with version
        id: rename
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="fyneex-operador-${VERSION}-${SHORT_SHA}.apk"
          mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: android/app/build/outputs/apk/debug/${{ steps.rename.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release (on push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rename.outputs.version }}-${{ github.run_number }}
          name: APK v${{ steps.rename.outputs.version }} build ${{ github.run_number }}
          body: |
            APK gerado automaticamente pelo commit `${{ github.sha }}`.

            **Baixe o .apk abaixo**, abra no Chrome do celular, permita instalar de fonte desconhecida, instale por cima do anterior.
          files: android/app/build/outputs/apk/debug/${{ steps.rename.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
